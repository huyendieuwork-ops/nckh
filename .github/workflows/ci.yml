name: CI

on:
  pull_request:
  push:
    branches: ["main", "master", "work"]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prisma generate
        run: npm run prisma:generate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/student_research_navigator?schema=public

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
